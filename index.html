<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>For U Raissa</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(#ff9a9e, #fad0c4);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  font-family: Arial;
}

/* KADO */
#gift {
  width: 120px;
  height: 120px;
  background: red;
  position: relative;
  cursor: pointer;
  border-radius: 10px;
}

#gift::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 20px;
  background: gold;
  top: 50%;
  transform: translateY(-50%);
}

#gift::after {
  content: "";
  position: absolute;
  width: 20px;
  height: 100%;
  background: gold;
  left: 50%;
  transform: translateX(-50%);
}

/* BUNGA */
.flower {
  position: absolute;
  font-size: 30px;
  opacity: 0;
  animation: float 3s forwards;
}

@keyframes float {
  0% { transform: translateY(0); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(-200px); opacity: 0; }
}

/* TEKS */
#text {
  position: absolute;
  font-size: 40px;
  color: white;
  opacity: 0;
  transition: 1s;
}
</style>
</head>

<body>

<div id="gift"></div>
<div id="text">For U Raissa 💖</div>

<script>
const gift = document.getElementById("gift");
const text = document.getElementById("text");

gift.addEventListener("click", () => {
  gift.style.display = "none";

  text.style.opacity = 1;

  // munculin bunga
  for (let i = 0; i < 20; i++) {
    const flower = document.createElement("div");
    flower.classList.add("flower");
    flower.innerText = "🌸";

    flower.style.left = Math.random() * window.innerWidth + "px";
    flower.style.top = window.innerHeight + "px";

    document.body.appendChild(flower);

    setTimeout(() => flower.remove(), 3000);
  }
});
</script>

</body>
</html>
